<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/Login-Cadastro.css">
    <link rel="icon" type="image/png" href="images/logo game star.png">
    <title>GameStar</title>
</head>

<body>
    
    <header>
        <a href="" class="logo">
            <i><img src="/images/logo game star.png" alt="Logo" class="logo"></i> GameStar
        </a>
        
        <div class="nav">
            <a href="#" class="nav-paginas">Sobre</a>
            <a href="#" class="nav-paginas">Suporte</a>
        </div>
    </header>

    <main class="main-auth">
        <div class="bloco_Login">
            <img src="images/logo game star.png" alt="Logo" class="logo-login">
            <h2> Bem-vindo ao <br>GameStar</h2>

            <form id="formularioLogin">
                <label for="usuario">E-mail Usuário</label>
                <input type="email" placeholder="E-mail" id="email">

                <label for="senha">Senha</label>
                <input type="senha" placeholder="Senha">

                <div class="containerBotao"><button type="submit">Entrar</button></div>
            </form>

            <p>
                Não tem conta? 
                <a href="pages/cadastro.html">Crie uma</a>
            </p>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="../services/api.js"></script>
    <script src="scripts/login.js"></script>
</body>

</html>
