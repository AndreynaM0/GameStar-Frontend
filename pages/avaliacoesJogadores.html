<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/style.css">
    <title>GameStar</title>
</head>

<body>

    <header class="navbar">
        <div class="logomarca">
            <img src="../images/logo game star.png" alt="Logo" class="logo">
            <h1>GameStar</h1>
        </div>

        <div class="barraDePesquisa">
            <input type="text" placeholder="Buscar" id="barraDeBusca">
        </div>

        <ul>
            <li><a href="#">Usuário</a></li>
            <li><a href="#">Sobre</a></li>
            <li><a href="#">Suporte</a></li>
        </ul>
    </header>

    <main>
        <section class="sessao_avaiacoesJogadores">

            <h1 class="nomedoJogo">Nome do Jogo</h1>

            <div class="avaliacoesDeJogadores">
                <div class="blocoEsquerdo">
                    <img src="../images/logo game star.png" alt="DESCRIÇÃO_aLTERNATIVA" class="capaDojogo">

                    <a href="../pages/cadastroAvaliacao.html" class="botaoAvaliar">Avaliar</a>
                </div>

                <div class="blocoAvaliacao">

                    <div class="avaliacoes">

                        <div class="avaliacao">

                            <div class="avaliacao_usuarios">
                                <div class="avatar"></div>


                                <div>
                                    <h3>User01</h3>

                                    <p>
                                        descrição da avaliação do jogador...
                                    </p>
                                </div>

                            </div>

                            <div class="nota_Avaliacao">
                                <span>Nota</span>
                                <strong>4,5</strong>
                            </div>
                        </div>

                    </div>

                </div>

                <div class="coluna-direita_avaliacao">
                    <h3>Quantas pessoas acharam <br>esse conteúdo relevante</h3>
                    <div class="curtidasComentario">
                        <img src="../images/curtida.png" alt="Curtida" class="icone_curtida">
                        <span>100</span>
                    </div>
                </div>

            </div>


        </section>
    </main>

    <script src="#"></script>
</body>

</html>
