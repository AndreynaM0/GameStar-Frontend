<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/avaliar.css">
    <link rel="icon" type="image/png" href="../images/logo game star.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Avaliar Jogo</title>
</head>

<body>

    <header>
        <a href="inicio.html" class="logo">
            <i><img src="/images/logo game star.png" alt="Logo" class="logo"></i> GameStar
        </a>
        
        <div class="pesquisa">
            <input type="text" placeholder="Buscar...">
        </div>
        
        <div class="nav">
            <div class="usuario">
                <img src="/images/user.png" alt="Avatar">
                <a href="perfil.html" class="nav-paginas">
                <span>Usuario568 <i class="fa-solid fa-chevron-down" style="font-size: 12px;"></i></span>
                </a>
            </div>
            <a href="#" class="nav-paginas">Sobre</a>
            <a href="#" class="nav-paginas">Suporte</a>
        </div>
    </header>

    <main>
        <section class="cadastroDeJogo">

            <h2>Nome do Jogo</h2>

            <div class="conteudoDoJogo">
                <img src="/images/sub2.jpg" alt="Capa do Jogo" class="capaDojogo">
                <form>
                    <label for="nota"> Sua Nota</label>
                    <input type="number" id="nota" min="0" max="10">

                    <label for="dataFinalizacao"> Data de Finalização</label>
                    <input type="date" id="dataFinalizacao">

                    <label for="status">Status</label>
                    <select id="statusJogo">
                        <option>Finalizado</option>
                        <option>Abandonado</option>
                    </select>

                    <label for="opinião">Opinião sobre o jogo</label>
                    <textarea id="campoDeTexto" rows="6" placeholder="Opcional" ></textarea>

                    <div class="btSalvarAvaliacao"><button type="submit">Salvar</button></div>

                </form>

            </div>
        </section>
    </main>

    <script src="#"></script>
</body>

</html>
