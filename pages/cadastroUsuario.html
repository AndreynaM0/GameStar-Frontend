<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/style.css">
    <title>GameStar</title>
</head>

<body>
    
    <header class="navbar">
        <div class="logomarca">
            <img src="../images/logo game star.png" alt="Logo" class="logo">
            <h1>GameStar</h1>
        </div>

        <ul>
            <li id="menuUsuario" style="display: none;">
                <a href="#">Usuário</a>
            </li>
            <li><a href="#">Sobre</a></li>
            <li><a href="#">Suporte</a></li>
        </ul>
    </header>

    <main class="main-auth">
        <div class="bloco_cadastro">
            <img src="../images/logo game star.png" alt="Logo" class="logo-login">
            <h2> Cadastre - se</h2>

            <form>
                <label for="nomeUsuario"> Nome de Usuário</label>
                <input type="text" id="usuario">

                <label for="email"> E-mail</label>
                <input type="email" id="email">

                <label for="senha">Senha</label>
                <input type="password" id="senha">

                <label for="confirmarSenha">Confirmar Senha</label>
                <input type="password" id="confirmarSenha">

                <div class="containerBotaoCadastro"><button type="submit">Criar Conta</button></div>
            </form>

            <p>
                Já tem conta? 
                <a href="../index.html">Entrar</a>
            </p>

        </div>
    </main>

    <script src="#"></script>
</body>

</html>
