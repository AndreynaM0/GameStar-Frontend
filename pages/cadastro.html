<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/login-cadastro.css">
    <link rel="icon" type="image/png" href="../images/logo game star.png">
    <title>GameStar</title>
</head>

<body>
    
    <header>
        <a href="" class="logo">
            <i><img src="/images/logo game star.png" alt="Logo" class="logo"></i> GameStar
        </a>
        
        <div class="nav">
            <a href="#" class="nav-paginas">Sobre</a>
            <a href="#" class="nav-paginas">Suporte</a>
        </div>
    </header>

    <main class="main-auth">
        <div class="bloco_cadastro">
            <img src="../images/logo game star.png" alt="Logo" class="logo-login">
            <h2> Cadastre-se</h2>

            <form>
                <label for="nomeUsuario"> Nome de Usuário</label>
                <input type="text" id="usuario">

                <label for="email"> E-mail</label>
                <input type="email" id="email">

                <label for="senha">Senha</label>
                <input type="password" id="senha">

                <label for="confirmarSenha">Confirmar Senha</label>
                <input type="password" id="confirmarSenha">

                <div class="containerBotaoCadastro"><button type="submit">Criar Conta</button></div>
            </form>

            <p>
                Já tem conta? 
                <a href="../index.html">Entrar</a>
            </p>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="../services/api.js"></script>
    <script src="#"></script>
</body>

</html>
