<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/perfil.css">
    <link rel="icon" href="../images/logo game star.png">
    <title>Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <a href="inicio.html" class="logo">
            <i><img src="..//images/logo game star.png" alt="Logo" class="logo"></i> GameStar
        </a>
        
        <div class="pesquisa">
            <input type="text" placeholder="Buscar...">
        </div>
        
        <div class="nav">
            <div class="usuario">
                <img src="..//images/user.png" alt="Avatar">
                <a href="perfil.html" class="nav-paginas">
                <strong><i class="fa-solid fa-chevron-down" style="font-size: 12px;"></i></strong>
                </a>
            </div>
            <a href="#" class="nav-paginas">Sobre</a>
            <a href="#" class="nav-paginas">Suporte</a>
        </div>
    </header>

    <div class="container">
        
        <div class="perfil">
            <img src="..//images/user.png">
            <h1 class="nome">Usuario568</h1>
            <button id="btnLogout" class="logout-btn">Sair da Conta</button>
        </div>

        <nav class="abas-perfil">
            <a href="perfil.html" class="active">Perfil</a>
            <a href="avaliacoes.html">Avaliações</a>
            <a href="favoritos.html">Favoritos</a>
        </nav>

        <div class="main-content">
            
            <div class="infos">
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-number"></div>
                        <div class="stat-label">Total de Jogos</div>
                    </div>
                    <br>
                    <div class="stat-box">
                        <div class="stat-number"></div>
                        <div class="stat-label"></div>
                    </div>
                </div>

            </div>

            <div class="content">
                
                <div class="content-section">
                    <h2 class="section-title">Jogos Favoritos</h2>
                    <div class="favorites-grid">
                        <div class="game-card-large"><a href="jogo.html"><img src="" alt=""></a></div>
                        <div class="game-card-large"><a href="jogo.html"><img src="" alt=""></a></div>
                        <div class="game-card-large"><a href="jogo.html"><img src="" alt=""></a></div>
                    </div>
                </div>

                <div class="content-section">
                    <h2 class="section-title">Jogos Recentes <span>Ver todos</span></h2>
                    <div class="recent-grid">
                        <div class="game-card-small">
                            <a href="jogo.html"><img src="" alt=""></a>
                            <div class="game-info-mini"><span></span> <span class="rating-red"></span></div>
                        </div>
                        <div class="game-card-small">
                            <a href="jogo.html"><img src="" alt=""></a>
                            <div class="game-info-mini"><span></span> <span class="rating-red"></span></div>
                        </div>
                        <div class="game-card-small">
                            <a href="jogo.html"><img src="" alt=""></a>
                            <div class="game-info-mini"><span></span> <span class="rating-red"></span></div>
                        </div>
                        <div class="game-card-small">
                            <a href="jogo.html"><img src="" alt=""></a>
                            <div class="game-info-mini"><span></span> <span class="rating-red"></span></div>
                        </div>
                        <div class="game-card-small">
                            <a href="jogo.html"><img src="" alt=""></a>
                            <div class="game-info-mini"><span></span> <span class="rating-red"></span></div>
                        </div>
                        <div class="game-card-small">
                            <a href="jogo.html"><img src="" alt=""></a>
                            <div class="game-info-mini"><span></span> <span class="rating-red"></span></div>
                        </div>
                    </div>
                </div>

                <div class="content-section">
                    <h2 class="section-title">Avaliações Recentes</h2>
                    
                    <div class="review-item">
                        <a href=""><img class="review-poster" src="" alt=""></a>
                        <div class="review-details">
                            <h4>F</h4>
                            <div class="review-meta"><span class="rating-red">4/5</span></div>
                            <div class="review-text"></div>
                        </div>
                    </div>

                    <hr style="border: 0; border-top: 1px solid #555; margin-bottom: 20px;">

                    <div class="review-item">
                        <a href=""><img class="review-poster" src="" alt=""></a>
                        <div class="review-details">
                            <h4></h4>
                            <div class="review-meta"><span class="rating-red"></span></div>
                            <div class="review-text"></div>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="../services/api.js"></script>
    <script src="../scripts/perfil.js"></script>
    <script src="../scripts/barraPesquisa.js"></script>

</html>
