<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/style.css">
    <title>GameStar</title>
</head>

<body>

    <header class="navbar">
        <div class="logomarca">
            <img src="../images/logo game star.png" alt="Logo" class="logo">
            <h1>GameStar</h1>
        </div>

        <div class="barraDePesquisa">
            <input type="text" placeholder="Buscar" id="barraDeBusca">
        </div>

        <ul>
            <li><a href="#">Usuário</a></li>
            <li><a href="#">Sobre</a></li>
            <li><a href="#">Suporte</a></li>
        </ul>
    </header>

    <main>
        <section class="cadastroDeJogo">

            <h2>Nome do Jogo</h2>

            <div class="conteudoDoJogo">
                <img src="../images/logo game star.png" alt="DESCRIÇÃO_aLTERNATIVA" class="capaDojogo">
                <form>
                    <label for="nota"> Sua Nota</label>
                    <input type="number" id="nota" min="0" max="10">

                    <label for="dataFinalizacao"> Data de Finalização</label>
                    <input type="date" id="dataFinalizacao">

                    <label for="status">Status</label>
                    <select id="statusJogo">
                        <option>Finalizado</option>
                        <option>Jogando</option>
                        <option>Pausado</option>
                        <option>Abandonado</option>
                    </select>

                    <label for="opinião">Opinião sobre o jogo</label>
                    <textarea id="campoDeTexto" rows="6"></textarea>

                    <div class="btSalvarAvaliacao"><button type="submit">Salvar</button></div>

                </form>

            </div>
        </section>
    </main>

    <script src="#"></script>
</body>

</html>
