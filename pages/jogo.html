<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/jogo.css">
    <link rel="icon" type="image/png" href="../images/logo game star.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Jogo</title>
</head>

<body>

    <header>
        <a href="inicio.html" class="logo">
            <i><img src="..//images/logo game star.png" alt="Logo" class="logo"></i> GameStar
        </a>

        <div class="pesquisa">
            <input type="text" placeholder="Buscar...">
        </div>

        <div class="nav">
            <div class="usuario">
                <img src="..//images/user.png" alt="Avatar">
                <a href="perfil.html" class="nav-paginas">
                    <strong> <i class="fa-solid fa-chevron-down" style="font-size: 12px;"></i></strong>
                </a>
            </div>
            <a href="#" class="nav-paginas">Sobre</a>
            <a href="#" class="nav-paginas">Suporte</a>
        </div>
    </header>

    <main>
        <section class="sessao_jogo">

            <h1>(Nome do Jogo)</h1>
            <div class="informacoesDoJogo">
                <div class="blocoEsquerdo">
                    <img src="" alt="Capa do Jogo" class="capaDojogo">
                    <a href="#" id="btnAvaliar" class="botaoAvaliar">Avaliar</a>
                    <a href="#" id="btnFavoritar" class="botaoAvaliar">Favoritar</a>
                    <a class="botaoAvaliar" id="btnExcluirJogo">Excluir</a>
                </div>

                <div class="blocoCentral">

                    <div class="sobre_Jogo">
                        <h2>Sobre o Jogo: </h2>
                        <p>
                            (Descrição sobre o Jogo)
                        </p>
                    </div>

                    <div class="avaliacoes">
                        <h2>Avaliações</h2>
                        <div id="reviews-container">
                        </div>
                    </div>

                </div>
            </div>

            <div class="coluna-direita">
                <h2>Nota</h2>
                <div class="notaGeral">
                    <img src="../images/hollywood-star.png" alt="Estrela" class="icone_estrela">
                    <span>4,0</span>
                </div>
            </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="../services/api.js"></script>
    <script src="../scripts/jogo.js"></script>
    <script src="../scripts/barraPesquisa.js"></script>
</body>

</html>
